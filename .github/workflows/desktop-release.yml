name: Desktop Release (macOS + Windows)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Versão semver (ex: 1.0.1)'
        required: true
        default: '1.0.0'
  push:
    tags:
      - 'desktop/v*'

permissions:
  contents: write
  actions: read

env:
  NODE_VERSION: '22'
  DOTNET_VERSION: '8.0.x'

jobs:
  mac:
    name: macOS DMG + ZIP
    runs-on: macos-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Checkout CMMS (mufutu)
        uses: actions/checkout@v4
        with:
          repository: osvaldowafulua/mufutu
          path: mufutu
          token: ${{ secrets.MUFUTU_CMMS_CHECKOUT_TOKEN }}

      - name: Resolve version
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" =~ ^desktop/v(.+)$ ]]; then
            echo "version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Import Apple signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          chmod +x mufutu/apps/desktop-mac/scripts/import-apple-cert.sh
          mufutu/apps/desktop-mac/scripts/import-apple-cert.sh

      - name: Package macOS
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          chmod +x mufutu/apps/desktop-mac/scripts/*.sh
          mufutu/apps/desktop-mac/scripts/package.sh "${{ steps.version.outputs.version }}"

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-mac-assets
          path: |
            mufutu/apps/desktop-mac/artifacts/dist/**
          retention-days: 30

  win:
    name: Windows MSI/EXE
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Checkout código-fonte (mufutu — privado)
        uses: actions/checkout@v4
        with:
          repository: osvaldowafulua/mufutu
          path: mufutu
          token: ${{ secrets.MUFUTU_CMMS_CHECKOUT_TOKEN }}

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -match '^desktop/v(.+)$') {
            $v = $Matches[1]
          } else {
            $v = "${{ github.event.inputs.version }}"
          }
          "version=$v" >> $env:GITHUB_OUTPUT

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Import code signing certificate
        shell: pwsh
        env:
          WIN_CODESIGN_PFX: ${{ secrets.WIN_CODESIGN_PFX }}
          WIN_CODESIGN_PASSWORD: ${{ secrets.WIN_CODESIGN_PASSWORD }}
        run: |
          $certDir = "mufutu/apps/desktop-win/scripts/certs"
          New-Item -ItemType Directory -Force -Path $certDir | Out-Null
          if ($env:WIN_CODESIGN_PFX) {
            [IO.File]::WriteAllBytes("$certDir/mufutu-codesign.pfx", [Convert]::FromBase64String($env:WIN_CODESIGN_PFX))
          } else {
            # Sem secret: o package.ps1 gera self-signed com password aleatória
            Write-Host "WIN_CODESIGN_PFX não configurado — package.ps1 usa self-signed"
          }

      - name: Package Windows
        shell: pwsh
        env:
          WIN_CODESIGN_PASSWORD: ${{ secrets.WIN_CODESIGN_PASSWORD }}
        run: |
          & mufutu/apps/desktop-win/scripts/package.ps1 -Version "${{ steps.version.outputs.version }}"

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-win-assets
          path: |
            mufutu/apps/desktop-win/artifacts/installer/**
          retention-days: 30

  release:
    name: GitHub Release
    needs: [mac, win]
    runs-on: ubuntu-latest
    # SÓ com tag: um workflow_dispatch é um build de teste e não pode publicar
    # release real (esta condição já quase publicou releases por engano).
    if: startsWith(github.ref, 'refs/tags/desktop/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: desktop-*-assets
          merge-multiple: true
          path: release-assets
      - name: Publicar release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/publish-mufutusoftware-release.sh
          VERSION="${{ needs.mac.outputs.version }}"
          bash scripts/publish-mufutusoftware-release.sh "$VERSION" release-assets
