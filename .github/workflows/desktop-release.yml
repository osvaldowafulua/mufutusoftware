name: Desktop Release (macOS + Windows)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Versão semver (ex: 1.0.1)'
        required: true
        default: '1.0.0'
  push:
    tags:
      - 'desktop/v*'

permissions:
  contents: write
  actions: read

env:
  NODE_VERSION: '22'
  DOTNET_VERSION: '8.0.x'

jobs:
  mac:
    name: macOS DMG + ZIP
    runs-on: macos-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Checkout CMMS (mufutu)
        uses: actions/checkout@v4
        with:
          repository: osvaldowafulua/mufutu
          path: mufutu
          token: ${{ secrets.MUFUTU_CMMS_CHECKOUT_TOKEN }}

      - name: Resolve version
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" =~ ^desktop/v(.+)$ ]]; then
            echo "version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Package macOS
        env:
          MUFUTU_CMMS_DIR: ${{ github.workspace }}/mufutu
        run: |
          chmod +x apps/desktop-mac/scripts/*.sh
          apps/desktop-mac/scripts/package.sh "${{ steps.version.outputs.version }}"

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-mac-assets
          path: |
            apps/desktop-mac/artifacts/dist/**
          retention-days: 30

  win:
    name: Windows MSI/EXE
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -match '^desktop/v(.+)$') {
            $v = $Matches[1]
          } else {
            $v = "${{ github.event.inputs.version }}"
          }
          "version=$v" >> $env:GITHUB_OUTPUT

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Package Windows
        shell: pwsh
        run: |
          & apps/desktop-win/scripts/package.ps1 -Version "${{ steps.version.outputs.version }}" -SkipSign -SkipObfuscate

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-win-assets
          path: |
            apps/desktop-win/artifacts/installer/**
          retention-days: 30

  release:
    name: GitHub Release
    needs: [mac, win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/desktop/') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: desktop-*-assets
          merge-multiple: true
          path: release-assets
      - name: Publicar release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/publish-release.sh
          VERSION="${{ needs.mac.outputs.version }}"
          bash scripts/publish-release.sh "$VERSION" release-assets
