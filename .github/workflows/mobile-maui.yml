name: Mobile MAUI (Android + iOS)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Versão semver (ex: 1.0.0)'
        required: false
        default: '1.0.0'
      diagnostico:
        description: 'Build diagnóstico (sem trimming) para isolar crash de arranque'
        required: false
        default: 'false'
  push:
    tags:
      - 'mobile-maui/v*'

permissions:
  contents: write
  actions: read

env:
  DOTNET_VERSION: '8.0.404'
  MOBILE_MAUI_DIR: mufutu/apps/mobile-maui
  CI: true

jobs:
  test-connectivity:
    name: Testes unitários + API health
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout código-fonte (mufutu — privado)
        uses: actions/checkout@v4
        with:
          repository: osvaldowafulua/mufutu
          path: mufutu
          token: ${{ secrets.MUFUTU_CMMS_CHECKOUT_TOKEN }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: SDK activo
        run: dotnet --info

      - name: Restore Core + Tests
        working-directory: ${{ env.MOBILE_MAUI_DIR }}
        run: dotnet restore tests/Mufutu.Mobile.Tests/Mufutu.Mobile.Tests.csproj

      - name: Unit tests (conectividade)
        working-directory: ${{ env.MOBILE_MAUI_DIR }}
        run: |
          dotnet test tests/Mufutu.Mobile.Tests/Mufutu.Mobile.Tests.csproj \
            -c Release --logger "trx;LogFileName=mobile-connectivity.trx"

      - name: Probe API produção
        run: bash ${{ env.MOBILE_MAUI_DIR }}/scripts/test-api-connectivity.sh

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mobile-maui-test-results
          path: ${{ env.MOBILE_MAUI_DIR }}/tests/Mufutu.Mobile.Tests/TestResults/**/*.trx
          retention-days: 30

  build-android:
    name: Build Android (APK)
    needs: test-connectivity
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout código-fonte (mufutu — privado)
        uses: actions/checkout@v4
        with:
          repository: osvaldowafulua/mufutu
          path: mufutu
          token: ${{ secrets.MUFUTU_CMMS_CHECKOUT_TOKEN }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: SDK activo
        shell: bash
        run: dotnet --version

      - name: Instalar workloads MAUI
        working-directory: ${{ env.MOBILE_MAUI_DIR }}
        shell: bash
        run: |
          dotnet workload update
          dotnet workload install maui-android
          dotnet workload restore src/Mufutu.Mobile/Mufutu.Mobile.csproj
          dotnet workload list

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" =~ ^mobile-maui/v(.+)$ ]]; then
            echo "version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version || '1.0.0' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & publicar APK
        working-directory: ${{ env.MOBILE_MAUI_DIR }}
        shell: pwsh
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          dotnet nuget locals all --clear

          # Descodificar keystore se estiver configurado nos Secrets
          $signArgs = @()
          if ($env:KEYSTORE_B64) {
            $ksPath = "$env:RUNNER_TEMP\mufutu.keystore"
            [IO.File]::WriteAllBytes($ksPath, [Convert]::FromBase64String($env:KEYSTORE_B64))
            $signArgs = @(
              "-p:AndroidKeyStore=true",
              "-p:AndroidSigningKeyStore=$ksPath",
              "-p:AndroidSigningStorePass=$env:KEYSTORE_PASSWORD",
              "-p:AndroidSigningKeyAlias=$env:KEY_ALIAS",
              "-p:AndroidSigningKeyPass=$env:KEY_PASSWORD"
            )
          } else {
            Write-Warning "ANDROID_KEYSTORE_B64 nao configurado - APK sera assinado com chave de debug"
          }

          dotnet publish src/Mufutu.Mobile/Mufutu.Mobile.csproj `
            -f net8.0-android -c Release `
            -p:ApplicationDisplayVersion=${{ steps.ver.outputs.version }} `
            -p:AndroidPackageFormat=apk `
            -p:MufutuDiag=${{ github.event.inputs.diagnostico || 'false' }} `
            @signArgs `
            -o artifacts/android

      - name: Selecionar APK assinado
        working-directory: ${{ env.MOBILE_MAUI_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          cd artifacts/android
          ls -la

          # O dotnet publish gera DOIS ficheiros: com.mufutu.mobile.apk (sem
          # assinatura) e com.mufutu.mobile-Signed.apk (assinado). O ciclo
          # antigo renomeava os dois para o mesmo nome e, por ordem alfabética,
          # o NÃO-assinado ficava em último e sobrescrevia o assinado — o APK
          # publicado saía sem assinatura e o Android recusava instalá-lo
          # ("não foi possível instalar"). Aqui ficamos só com o assinado e
          # apagamos o resto.
          if [ ! -f com.mufutu.mobile-Signed.apk ]; then
            echo "::error::Não existe APK assinado — verifique os secrets ANDROID_KEYSTORE_*"
            exit 1
          fi
          find . -maxdepth 1 -name '*.apk' ! -name 'com.mufutu.mobile-Signed.apk' -delete
          ls -la

      - name: Verificar assinatura do APK
        working-directory: ${{ env.MOBILE_MAUI_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          APK=artifacts/android/com.mufutu.mobile-Signed.apk
          SDK="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
          # Este job corre em windows-latest: aqui o executável é
          # apksigner.bat, não apksigner — procurar os dois (a primeira versão
          # deste passo procurava só "apksigner" e falhava com exit 127).
          APKSIGNER=$(find "$SDK/build-tools" \( -name 'apksigner.bat' -o -name 'apksigner' \) -type f 2>/dev/null | sort -V | tail -1)

          if [ -n "$APKSIGNER" ]; then
            echo "apksigner: $APKSIGNER"
            "$APKSIGNER" verify --print-certs "$APK"
            echo "✓ APK assinado e verificado (apksigner)"
          else
            # Sem apksigner: verificação mínima mas real — um APK sem
            # assinatura v1 não traz META-INF/*.RSA|DSA|EC nem MANIFEST.MF,
            # que foi exactamente o defeito publicado na 1.0.17.
            echo "::warning::apksigner não encontrado em $SDK — verificação por conteúdo"
            if ! unzip -l "$APK" | grep -qE 'META-INF/.*\.(RSA|DSA|EC)$'; then
              echo "::error::APK sem bloco de assinatura — não seria instalável"
              exit 1
            fi
            echo "✓ APK contém bloco de assinatura"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: mufutu-mobile-android
          path: ${{ env.MOBILE_MAUI_DIR }}/artifacts/android/**
          retention-days: 30

  build-ios:
    name: Build iOS
    needs: test-connectivity
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout código-fonte (mufutu — privado)
        uses: actions/checkout@v4
        with:
          repository: osvaldowafulua/mufutu
          path: mufutu
          token: ${{ secrets.MUFUTU_CMMS_CHECKOUT_TOKEN }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: SDK activo
        run: dotnet --version

      - name: Instalar workloads MAUI
        working-directory: ${{ env.MOBILE_MAUI_DIR }}
        run: |
          dotnet workload update
          dotnet workload install maui-android maui-ios
          dotnet workload restore src/Mufutu.Mobile/Mufutu.Mobile.csproj
          dotnet workload list

      - name: Resolve version
        id: ver
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" =~ ^mobile-maui/v(.+)$ ]]; then
            echo "version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version || '1.0.0' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build iOS (sem assinatura em CI)
        working-directory: ${{ env.MOBILE_MAUI_DIR }}
        env:
          CI: true
        run: |
          dotnet build src/Mufutu.Mobile/Mufutu.Mobile.csproj \
            -f net8.0-ios -c Release \
            -p:ApplicationDisplayVersion=${{ steps.ver.outputs.version }}

      - name: Teste conectividade (macOS runner)
        run: bash ${{ env.MOBILE_MAUI_DIR }}/scripts/test-api-connectivity.sh

  release:
    name: Publicar artefactos
    needs: [build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/mobile-maui/')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: mufutu-mobile-android
          path: release-assets

      - name: Publicar GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VER="${TAG#mobile-maui/v}"
          NOTES="MUFUTU Mobile MAUI ${VER} — Android APK."
          ls -laR release-assets || true
          mapfile -t FILES < <(find release-assets -name '*.apk' -type f)
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "Nenhum APK em release-assets"
            exit 1
          fi
          gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "MUFUTU Mobile ${VER}" \
            --notes "$NOTES" "${FILES[@]}" 2>/dev/null || \
          gh release upload "$TAG" --repo "$GITHUB_REPOSITORY" --clobber "${FILES[@]}"
