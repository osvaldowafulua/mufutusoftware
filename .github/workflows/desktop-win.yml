name: Windows Desktop (WPF)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Versão semver (ex: 1.0.0)'
        required: false
        default: '1.0.0'
  push:
    tags:
      - 'desktop-win/v*'

permissions:
  contents: write
  security-events: write
  actions: read

env:
  DOTNET_VERSION: '8.0.x'
  DESKTOP_WIN_DIR: apps/desktop-win

jobs:
  build-test:
    name: Build & Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        working-directory: ${{ env.DESKTOP_WIN_DIR }}
        run: dotnet restore Mufutu.sln

      - name: Build solution
        working-directory: ${{ env.DESKTOP_WIN_DIR }}
        run: dotnet build Mufutu.sln -c Release --no-restore

      - name: Unit tests
        working-directory: ${{ env.DESKTOP_WIN_DIR }}
        run: dotnet test tests/Mufutu.Desktop.Tests/Mufutu.Desktop.Tests.csproj -c Release --no-build --logger "trx;LogFileName=desktop-tests.trx"

      - name: Verify production API connectivity
        shell: pwsh
        run: |
          & "${{ env.DESKTOP_WIN_DIR }}/scripts/test-api-connectivity.ps1" -ApiBaseUrl "https://api.mufutu.ao/api"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-test-results
          path: ${{ env.DESKTOP_WIN_DIR }}/tests/Mufutu.Desktop.Tests/TestResults/**/*.trx
          retention-days: 30

  security-sast:
    name: Security SAST
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        working-directory: ${{ env.DESKTOP_WIN_DIR }}
        run: dotnet restore Mufutu.sln

      - name: Vulnerable packages
        working-directory: ${{ env.DESKTOP_WIN_DIR }}
        run: |
          dotnet list package --vulnerable --include-transitive 2>&1 | Tee-Object -FilePath vulnerable-packages.log
          if ($LASTEXITCODE -ne 0) { exit 0 }

      - name: Upload SAST log
        uses: actions/upload-artifact@v4
        with:
          name: desktop-sast-logs
          path: ${{ env.DESKTOP_WIN_DIR }}/vulnerable-packages.log
          retention-days: 30

  codeql:
    name: CodeQL C#
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          queries: security-and-quality

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build for CodeQL
        working-directory: ${{ env.DESKTOP_WIN_DIR }}
        run: dotnet build Mufutu.sln -c Release

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3

  package-sign:
    name: Package, Sign & Verify
    needs: [build-test, security-sast, codeql]
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -match '^desktop-win/v(.+)$') {
            $v = $Matches[1]
          } else {
            $v = "${{ github.event.inputs.version }}"
            if (-not $v) { $v = "1.0.0" }
          }
          "version=$v" >> $env:GITHUB_OUTPUT

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Import code signing certificate
        shell: pwsh
        env:
          WIN_CODESIGN_PFX: ${{ secrets.WIN_CODESIGN_PFX }}
          WIN_CODESIGN_PASSWORD: ${{ secrets.WIN_CODESIGN_PASSWORD }}
        run: |
          $certDir = "${{ env.DESKTOP_WIN_DIR }}/scripts/certs"
          New-Item -ItemType Directory -Force -Path $certDir | Out-Null
          if ($env:WIN_CODESIGN_PFX) {
            [IO.File]::WriteAllBytes("$certDir/mufutu-codesign.pfx", [Convert]::FromBase64String($env:WIN_CODESIGN_PFX))
          } else {
            Write-Host "WIN_CODESIGN_PFX não configurado — gerar self-signed"
            & "${{ env.DESKTOP_WIN_DIR }}/scripts/generate-selfsigned-cert.ps1"
          }

      - name: Package build
        shell: pwsh
        env:
          WIN_CODESIGN_PASSWORD: ${{ secrets.WIN_CODESIGN_PASSWORD }}
        run: |
          & "${{ env.DESKTOP_WIN_DIR }}/scripts/package.ps1" -Version "${{ steps.version.outputs.version }}"

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mufutu-desktop-installer
          path: |
            ${{ env.DESKTOP_WIN_DIR }}/artifacts/installer/**
            ${{ env.DESKTOP_WIN_DIR }}/artifacts/logs/**
          retention-days: 90

  pentest-basic:
    name: OWASP ZAP baseline
    needs: package-sign
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ secrets.ZAP_BASE_URL || 'https://app.mufutu.ao' }}
          cmd_options: '-a -I'

  release:
    name: Publicar em mufutusoftware
    needs: [package-sign, pentest-basic]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/desktop-win/')
    steps:
      - uses: actions/checkout@v4

      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: mufutu-desktop-installer
          path: release-assets

      - name: Publicar release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/publish-release.sh
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#desktop-win/v}"
          bash scripts/publish-release.sh "$VERSION" release-assets
