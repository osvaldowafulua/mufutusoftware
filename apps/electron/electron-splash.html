<!DOCTYPE html>
<html lang="pt-AO">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'; img-src 'self' file: data:" />
  <title>MUFUTU</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #E8612D;
      font-family: Inter, system-ui, -apple-system, sans-serif;
      -webkit-app-region: drag;
    }
    .shell {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      background: #E8612D;
    }
    .logo {
      width: 128px;
      height: 128px;
      object-fit: contain;
      animation: logoIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .tagline {
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.72);
      animation: fadeUp 0.7s ease-out 0.25s both;
    }
    .bar {
      width: 160px;
      height: 3px;
      background: rgba(255, 255, 255, 0.22);
      border-radius: 3px;
      overflow: hidden;
      animation: fadeUp 0.7s ease-out 0.35s both;
    }
    .bar-fill {
      height: 100%;
      width: 40%;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 3px;
      animation: slide 1.3s ease-in-out infinite;
    }
    @keyframes logoIn {
      from { opacity: 0; transform: scale(0.92); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slide {
      0% { transform: translateX(-110%); }
      100% { transform: translateX(280%); }
    }
  </style>
</head>
<body>
  <div class="shell">
    <img id="logo" class="logo" alt="MUFUTU" src="assets/splash-logo.png" />
    <p class="tagline">Gestão mineira · A carregar…</p>
    <div class="bar"><div class="bar-fill"></div></div>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const logo = params.get('logo');
    if (logo) {
      document.getElementById('logo').src = decodeURIComponent(logo);
    }
  </script>
</body>
</html>
