<!DOCTYPE html>
<html lang="pt-AO">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'; img-src 'self' file: data:" />
  <title>MUFUTU</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: Inter, system-ui, -apple-system, sans-serif;
      -webkit-app-region: drag;
    }
    .shell {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      background: #000000;
      border-radius: 14px;
      border: 1px solid rgba(232, 97, 45, 0.18);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.55);
    }
    .logo-stage {
      position: relative;
      width: 200px;
      height: 130px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo {
      width: 188px;
      height: auto;
      object-fit: contain;
      opacity: 0;
      transform: scale(0.9) translateY(10px);
      animation: logoIn 1s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
      filter: drop-shadow(0 0 24px rgba(232, 97, 45, 0.35));
    }
    .logo-shine {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        105deg,
        transparent 35%,
        rgba(232, 97, 45, 0.12) 48%,
        rgba(255, 255, 255, 0.08) 50%,
        rgba(232, 97, 45, 0.12) 52%,
        transparent 65%
      );
      animation: shine 2.2s ease-in-out 0.6s infinite;
      pointer-events: none;
      mask-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 130"><rect width="200" height="130" rx="8"/></svg>');
    }
    .tagline {
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.45);
      animation: fadeUp 0.7s ease-out 0.45s both;
    }
    .bar {
      width: 180px;
      height: 3px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 3px;
      overflow: hidden;
      animation: fadeUp 0.7s ease-out 0.55s both;
    }
    .bar-fill {
      height: 100%;
      width: 40%;
      background: #E8612D;
      border-radius: 3px;
      animation: slide 1.3s ease-in-out infinite;
    }
    @keyframes logoIn {
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes shine {
      0%, 100% { transform: translateX(-120%); opacity: 0; }
      40%, 60% { opacity: 1; }
      100% { transform: translateX(120%); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slide {
      0% { transform: translateX(-110%); }
      100% { transform: translateX(280%); }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="logo-stage">
      <img id="logo" class="logo" alt="MUFUTU" />
      <div class="logo-shine" aria-hidden="true"></div>
    </div>
    <p class="tagline">Gestão mineira · A carregar…</p>
    <div class="bar"><div class="bar-fill"></div></div>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const logo = params.get('logo');
    const el = document.getElementById('logo');
    if (logo) {
      el.src = decodeURIComponent(logo);
    } else {
      el.src = 'assets/splash-logo.png';
    }
  </script>
</body>
</html>
